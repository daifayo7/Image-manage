<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片搜索 - Telegraph-Image</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/theme-chalk/index.css"
    integrity="sha256-ghr1zmXTODLKl1HULQd6fq1MIe7m3FJiNTOCT8sddLM=" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .search-header { background: #fff; border-bottom: 1px solid #e4e7ed; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .search-header .inner { display: flex; align-items: center; justify-content: space-between; height: 60px; padding: 0 24px; max-width: 1400px; margin: 0 auto; }
    .search-header .title { font-size: 20px; font-weight: 700; color: #303133; }
    .search-header .nav-links { display: flex; gap: 8px; }
    .search-main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .search-bar-wrap { max-width: 600px; margin: 0 auto 24px; }
    .result-count { color: #909399; font-size: 13px; margin-bottom: 16px; }
    .empty-state { text-align: center; padding: 80px 20px; color: #c0c4cc; }
    .empty-state .el-icon { font-size: 56px; }
    .empty-state p { margin-top: 12px; font-size: 14px; }
    .image-card { transition: transform .2s; cursor: default; }
    .image-card:hover { transform: translateY(-2px); }
    .image-card .img-wrap { position: relative; width: 100%; padding-top: 75%; overflow: hidden; background: #f5f7fa; border-radius: 4px 4px 0 0; }
    .image-card .img-wrap .el-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .image-card .img-wrap .fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #c0c4cc; font-size: 13px; }
    .image-card .body { padding: 10px; }
    .image-card .body .name { font-size: 12px; color: #303133; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .image-card .body .time { font-size: 11px; color: #909399; margin-top: 4px; }
    .image-card .body .actions { margin-top: 8px; display: flex; gap: 4px; }
    .image-card .body .actions .el-button { flex: 1; padding: 6px 8px; font-size: 12px; }
    .preview-img { max-width: 100%; max-height: 80vh; display: block; margin: 0 auto; }
    @media (max-width: 768px) { .search-header .inner { padding: 0 12px; } .search-main { padding: 12px; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="search-header">
      <div class="inner">
        <div class="title">图片搜索</div>
        <div class="nav-links">
          <a href="./"><el-button size="mini">返回首页</el-button></a>
          <a href="./admin.html"><el-button size="mini" type="warning">管理后台</el-button></a>
        </div>
      </div>
    </div>

    <div class="search-main">
      <div class="search-bar-wrap">
        <el-input
          v-model="keyword"
          placeholder="搜索图片名称或关键词..."
          size="large"
          clearable
          @keyup.enter.native="handleSearch"
          @clear="handleClear"
        >
          <el-button slot="append" icon="el-icon-search" @click="handleSearch">搜索</el-button>
        </el-input>
      </div>

      <div v-if="loading" style="text-align:center;padding:60px 0;">
        <i class="el-icon-loading" style="font-size:32px;color:#409EFF;"></i>
        <p style="margin-top:8px;color:#909399;">搜索中...</p>
      </div>

      <div v-else-if="error" style="text-align:center;padding:60px 0;">
        <i class="el-icon-warning" style="font-size:32px;color:#F56C6C;"></i>
        <p style="margin-top:8px;color:#F56C6C;">{{ error }}</p>
      </div>

      <div v-else-if="!searched" class="empty-state">
        <i class="el-icon-picture-outline"></i>
        <p>输入关键词搜索已上传的图片</p>
      </div>

      <div v-else-if="records.length === 0" class="empty-state">
        <i class="el-icon-info"></i>
        <p>未找到匹配结果</p>
      </div>

      <template v-else>
        <div class="result-count">共找到 {{ total }} 条结果</div>
        <el-row :gutter="16">
          <el-col
            :xs="12" :sm="8" :md="6" :lg="4"
            v-for="item in records"
            :key="item.key"
            style="margin-bottom:16px;"
          >
            <el-card class="image-card" :body-style="{ padding: '0px' }" shadow="hover">
              <div class="img-wrap">
                <el-image
                  v-if="!isVideo(item.key)"
                  :src="item.url"
                  fit="cover"
                  @click="handlePreview(item)"
                  lazy
                >
                  <div slot="error" class="fallback">
                    <i class="el-icon-document"></i> 预览失败
                  </div>
                </el-image>
                <div v-else class="fallback" style="background:#eef1f6;">
                  <i class="el-icon-video-camera" style="font-size:32px;color:#409EFF;"></i>
                </div>
              </div>
              <div class="body">
                <div class="name" :title="item.name">{{ item.name }}</div>
                <div class="time">{{ formatTime(item.time) }}</div>
                <div class="actions">
                  <el-button size="mini" type="primary" @click="handleCopy(item.url)">复制</el-button>
                  <el-button size="mini" @click="handlePreview(item)">预览</el-button>
                </div>
              </div>
            </el-card>
          </el-col>
        </el-row>
      </template>
    </div>

    <el-dialog :visible.sync="previewVisible" title="图片预览" width="80%" top="5vh" @closed="previewItem = null">
      <img v-if="previewItem && !isVideo(previewItem.key)" :src="previewItem.url" class="preview-img" />
      <video v-else-if="previewItem" :src="previewItem.url" class="preview-img" controls></video>
    </el-dialog>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"
  integrity="sha256-kXTEJcRFN330VirZFl6gj9+UM6gIKW195fYZeR3xDhc=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.3/lib/index.js"
  integrity="sha256-OFVFYfqhQ9nDnKh+NfIsefpy/fnjTwkK909ZYgo45nw=" crossorigin="anonymous"></script>
<script>
  new Vue({
    el: '#app',
    data: {
      keyword: '',
      records: [],
      total: 0,
      loading: false,
      searched: false,
      error: '',
      previewVisible: false,
      previewItem: null,
      searchTimer: null,
    },
    methods: {
      isVideo(key) {
        const ext = key.split('.').pop().toLowerCase();
        return ['mp4', 'mov', 'avi', 'webm', 'mkv', 'flv'].includes(ext);
      },
      handleSearch() {
        if (!this.keyword.trim()) { this.handleClear(); return; }
        clearTimeout(this.searchTimer);
        this.searchTimer = setTimeout(() => {
          this.loading = true;
          this.error = '';
          fetch(`/api/search?q=${encodeURIComponent(this.keyword.trim())}`)
            .then(r => r.json())
            .then(data => {
              this.records = data.records || [];
              this.total = data.total || 0;
              this.searched = true;
            })
            .catch(e => {
              this.error = '搜索失败，请检查网络连接';
              console.error(e);
            })
            .finally(() => { this.loading = false; });
        }, 300);
      },
      handleClear() {
        this.records = [];
        this.total = 0;
        this.searched = false;
        this.error = '';
      },
      handleCopy(url) {
        const text = `${window.location.origin}${url}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.clip = 'rect(0 0 0 0)';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        this.$message({ message: '链接已复制', type: 'success' });
      },
      handlePreview(item) {
        this.previewItem = item;
        this.previewVisible = true;
      },
      formatTime(ts) {
        if (!ts) return '未知';
        return new Date(ts).toLocaleString('zh-CN');
      }
    }
  });
</script>
</html>
